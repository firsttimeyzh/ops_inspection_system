<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>灵兔洞察系统 - 登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary-color: #007AFF;
      --primary-dark: #0066CC;
      --bg-dark: #dce3eb;
      --bg-card: rgba(255, 255, 255, 0.96);
      --border-color: rgba(0, 0, 0, 0.15);
      --text-primary: #0d1117;
      --text-secondary: #3d4852;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #dce3eb 0%, #cdd5df 35%, #bfc9d4 60%, #cdd5df 100%);
      background-size: 200% 200%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
      animation: gradientShift 15s ease infinite;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 30% 20%, rgba(0, 122, 255, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 70% 80%, rgba(0, 122, 255, 0.12) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(0, 122, 255, 0.08) 0%, transparent 65%);
      animation: pulseOverlay 8s ease-in-out infinite;
    }
    
    @keyframes pulseOverlay {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    
    .grid-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(0, 122, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 122, 255, 0.06) 1px, transparent 1px);
      background-size: 45px 45px;
      animation: gridMove 30s linear infinite;
    }
    
    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 45px 45px; }
    }
    
    .login-container {
      position: relative;
      z-index: 10;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 
        0 6px 24px rgba(0, 0, 0, 0.1),
        0 1px 3px rgba(0, 0, 0, 0.06);
    }
    
    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 14px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 122, 255, 0.15);
      border: 1px solid rgba(0, 122, 255, 0.1);
    }
    
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }
    
    .subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 5px;
    }
    
    .form-group {
      margin-bottom: 18px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    
    .form-group input {
      width: 100%;
      padding: 13px 15px;
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text-primary);
      transition: all 0.25s;
      outline: none;
    }
    
    .form-group input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
      background: rgba(255, 255, 255, 0.9);
    }
    
    .form-group input::placeholder {
      color: rgba(0, 0, 0, 0.4);
    }
    
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #dc2626;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 18px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: rgba(0, 0, 0, 0.3);
    }
    
    .glow-effect {
      position: absolute;
      top: -100%;
      left: -100%;
      width: 300%;
      height: 300%;
      background: radial-gradient(circle, rgba(102, 126, 234, 0.08) 0%, transparent 60%);
      pointer-events: none;
      animation: rotate 30s linear infinite;
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  
  <div class="login-container">
    <div class="glow-effect"></div>
    
    <div class="logo-section">
      <div class="logo">
        <img src="/static/images/logo.png?v=1" alt="灵兔洞察系统">
      </div>
      <div class="title">灵兔洞察系统</div>
      <div class="subtitle">Lingtu Insight System</div>
    </div>
    
    <div class="error-message" id="error-message"></div>
    
    <form id="login-form">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" placeholder="请输入用户名" required>
      </div>
      
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" required>
      </div>
      
      <button type="submit" class="btn btn-primary">登录</button>
    </form>
    
    <div class="footer">
      © 2026 Lingtu Insight System
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-message');
      
      errorDiv.classList.remove('show');
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const result = await response.json();
        
        if (result.success) {
          window.location.href = '/';
        } else {
          errorDiv.textContent = result.message || '登录失败';
          errorDiv.classList.add('show');
        }
      } catch (error) {
        errorDiv.textContent = '网络错误，请稍后重试';
        errorDiv.classList.add('show');
      }
    });
  </script>
</body>
</html>
