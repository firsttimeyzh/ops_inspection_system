{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">服务器巡检</h1>
  <p class="page-subtitle">批量检查服务器状态，生成巡检报告</p>
</div>

<div class="row">
  <!-- 左侧：配置表单 -->
  <div class="col-lg-5">
    <div class="apple-card">
      <div class="apple-card-header">
        <h3 class="apple-card-title">巡检配置</h3>
      </div>
      
      <div class="form-section">
        <div class="form-section-title">基本信息</div>
        <div class="form-group">
          <label class="form-label">
            项目名称
            <span class="form-label-hint">用于报告命名</span>
          </label>
          <input type="text" id="projectName" class="form-control" placeholder="例如：XX数据中心日常巡检">
        </div>
      </div>
      
      <div class="form-section">
        <div class="form-group">
          <label class="form-label">
            巡检人
            <span class="form-label-hint">报告中的签字人</span>
          </label>
          <input type="text" id="inspector" class="form-control" placeholder="例如：张三">
        </div>
      </div>
      
      <div class="form-section">
        <div class="form-group">
          <label class="form-label">
            服务器分组
            <span class="form-label-hint">留空表示全部服务器</span>
          </label>
          <select id="selectGroup" class="form-select">
            <option value="">全部服务器</option>
            {% for g in groups %}
            <option value="{{g.id}}">{{g.name}}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      
      <div class="form-section">
        <div class="form-section-title">报告格式</div>
        <div class="form-group">
          <label class="form-label">
            选择输出格式
          </label>
          <div class="format-options">
            <label class="format-option">
              <input type="radio" name="reportFormat" id="formatExcel" value="excel" checked>
              <span class="format-icon">📊</span>
              <span class="format-text">Excel</span>
            </label>
            <label class="format-option">
              <input type="radio" name="reportFormat" id="formatPdf" value="pdf">
              <span class="format-icon">📄</span>
              <span class="format-text">PDF</span>
            </label>
          </div>
        </div>
      </div>
      
      <div class="alert alert-info">
        <strong>告警阈值</strong><br>
        <span style="opacity: 0.8">
          CPU ≥ {{cpu}}% / 内存 ≥ {{mem}}% / 磁盘 ≥ {{disk}}%<br>
          超过阈值将计入异常问题描述
        </span>
      </div>
      
      <button id="btnStart" class="btn btn-success btn-block">
        开始巡检
      </button>
    </div>
  </div>
  
  <!-- 右侧：巡检进度 -->
  <div class="col-lg-7">
    <div class="apple-card">
      <div class="apple-card-header">
        <h3 class="apple-card-title">巡检进度</h3>
      </div>
      
      <div class="progress-container">
        <div class="progress-info">
          <span class="progress-label">当前进度</span>
          <span id="progressPercent" class="progress-percent">0%</span>
        </div>
        <div class="progress">
          <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>
      </div>
      
      <div class="form-section">
        <div class="form-section-title">执行日志</div>
        <pre id="logBox" class="log-box"></pre>
      </div>
      
      <div id="downloadBox" class="mt-3"></div>
    </div>
  </div>
</div>
{% endblock %}
